services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: financial-sim:latest
    environment:
      PYTHONPATH: /home/jovyan/work/src
      # Source .env.private before running docker compose up so these are populated.
      # Example:  source .env.private && docker compose up
      DB_PDF_PATH: ${DB_PDF_PATH:-}
      HOLDINGS_PATH: ${HOLDINGS_PATH:-}
      TRANSACTIONS_PATH: ${TRANSACTIONS_PATH:-}
      TICKER_MAP_PATH: ${TICKER_MAP_PATH:-}
      ETF_URLS_PATH: ${ETF_URLS_PATH:-}
      ETF_OVERRIDES_PATH: ${ETF_OVERRIDES_PATH:-}
      SNAPSHOT_DATE: ${SNAPSHOT_DATE:-}
    ports:
      - "8888:8888"
    volumes:
      - type: bind
        source: .
        target: /home/jovyan/work
    working_dir: /home/jovyan/work
    command: start-notebook.py --ServerApp.token='' --ServerApp.password=''
