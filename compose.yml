services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    image: financial-sim:latest
    environment:
      PYTHONPATH: /home/jovyan/work/src
      # Set DB_PDF_PATH to your Deutsche Bank report before running docker compose up.
      # Example:  DB_PDF_PATH=data/private/report.pdf docker compose up
      DB_PDF_PATH: ${DB_PDF_PATH:-}
    ports:
      - "8888:8888"
    volumes:
      - type: bind
        source: .
        target: /home/jovyan/work
    working_dir: /home/jovyan/work
    command: start-notebook.py --ServerApp.token='' --ServerApp.password=''
