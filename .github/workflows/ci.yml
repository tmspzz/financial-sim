name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install numpy pandas pytest ruff

      - name: Ruff format check
        run: ruff format --check src scripts tests

      - name: Ruff lint
        run: ruff check src scripts tests

      - name: Tests
        run: pytest -q
        env:
          PYTHONPATH: src
